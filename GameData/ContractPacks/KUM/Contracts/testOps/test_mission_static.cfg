CONTRACT_TYPE
{
	name = kumTestMissionStatic1

	title = "Destroy a static target" + " (" + @titlePeriod + ")"
	genericTitle = "Destroy a static target"

	group = munistorumTestOps
	agent = Komnenus Universalis Munistorum

	description = "It has recently come to our attention that we have many weapons lying around, some which we cannot even confirm are still functional, that's where you come in." + "\n\nMission Latitude: " + @titleLat + "\nMission Longitude: " + @titleLon
	genericDescription = "It has recently come to our attention that we have many weapons lying around, some which we cannot even confirm are still functional, that's where you come in."

	topic = Weapons
	subject = Experiment

	synopsis = "Test some hardware while destroying a static target."

	completedMessage = "Success! The staff at our facility is overjoyed with the data!"

	minExpiry = 0.0
	maxExpiry = 0.0

	cancellable = true
	declinable = true

	targetBody = HomeWorld()

	maxCompletions = 0
	maxSimultaneous = 2

	DATA
	{
		type = int

		// Name Safety
		nameAppend = Random(0, 65535)
		uniquenessCheck = CONTRACT_ACTIVE
		hidden = true
	}

	DATA
	{
		type = int

		// Is part testing a parameter?
		partTestValue = Random(0,1)

		// Period of mission
		periodSelector = Random(0,3)
		hidden = true
	}

	DATA
	{
		type = string

		title = "Target vessels"
		titlePeriod = @/munistorumDataStore:periodList.ElementAt(@/periodSelector)

		// Target Names
		targetVessel = "Target Static" + " ID: " + @/nameAppend
	}

	DATA
	{
		type = List<string>

		// Vehicle Lists
		targetList = [@/munistorumDataStore:earlyTargetStatics, @/munistorumDataStore:midTargetStatics, @/munistorumDataStore:lateTargetStatics, @/munistorumDataStore:standardTargetStatics].ElementAt(@/periodSelector)
		hidden = true
	}

	DATA
	{
		type = AvailablePart

		// Test Part
		testPart = AllParts().Where(b => b.IsUnlocked() && (b.Description().Contains("AGM-Testable") || b.Description().Contains("BMB-Testable") || b.Description().Contains("RKT-Testable") || b.Description().Contains("CNN-Testable") || b.Description().Contains("TRT-Testable"))).Random()
		hidden = true
	}

	DATA
	{
		type = double

		// Rewards
		science = 1 * (Random(0.5, 2.2) * Pow((@/periodSelector + 1), 0.333333))
		reputation = 2 * (Random(0.8, 2.0) * Pow((@/periodSelector + 1), 0.333333))
		funds = 4000 * (Random(0.8, 1.2) * Pow((@/periodSelector + 1), 0.333333))

		// Vehicle Coordinates
		squadLat = Random(-0.35, -0.1)
		squadLon = Random(-75.0, -77.5)
		squadHdg = Random(0.0, 360.0)

		// Title Coordinates
		titleLat = Round(@squadLat)
		titleLon = Round(@squadLon)
	}

	REQUIREMENT
	{
		name = CompleteContract
		type = CompleteContract
		contractType = kumRequiredUav
	}

	// Main contract rewards
	rewardScience = @/science
	rewardReputation = @/reputation
	rewardFunds = @/funds

	failureReputation = @/reputation / 4
	failureFunds = @/funds / 8
	advanceFunds = @/funds / 4

	BEHAVIOUR
	{
		name = SpawnTarget
		type = SpawnVessel
		deferVesselCreation = true

		VESSEL
		{
			name = @/targetVessel
			craftURL = "ContractPacks/KUM/Assets/Ships/" + @/targetList.Random()
			flagURL = Squad/Flags/retro
			vesselType = Unknown
			owned = false
			targetBody = HomeWorld()

			lat = @/squadLat
			lon = @/squadLon

			height = 5

			heading = @/squadHdg
		}
	}

	// Destroy all mission vessels (if possible) for safety
	BEHAVIOUR
	{
		name = ContingencyCleanup
		type = DestroyVessel

		onState = CONTRACT_COMPLETED

		vessel = @/targetVessel
	}

	// Parameters for completing the contract
	PARAMETER
	{
		name = TestingSequence
		type = PartTest

		title = "Approach the target for testing purposes"
		notes = "Run the test after all the procedures have been completed."
		completedMessage = "Tests complete, destroy the target!"

		rewardScience = (@/science * 2)
		rewardReputation = @/reputation
		rewardFunds = (@/funds / 2)

		failureReputation = 0.0
		failureFunds = 0.0

		optional = true

		part = @/testPart

		REQUIREMENT
		{
			name = Expression
			type = Expression

			expression = @/partTestValue == 1
		}

		PARAMETER
		{
			name = HasTestPart
			type = PartValidation

			title = "Have at least one " + @/testPart + " on your vehicle"

			part = @/testPart
			minCount = 1
		}

		PARAMETER
		{
			name = RendezvousCraft
			type = Rendezvous

			title = "Approach the target within 500 meters of distance"
			notes = "Rendezvous should allow us to test the hardware."

			vessel = @/targetVessel

			disableOnStateChange = false

			distance = 500.0
		}

		PARAMETER
		{
			name = DurationDelay
			type = Duration

			preWaitText = "Rendezvous for equipment testing"
			waitingText = "Testing equipment..."
			completionText = "Equipment testing"

			completeInSequence = true

			duration = 20s

			startCriteria = PARAMETER_COMPLETION
			parameter = RendezvousCraft
		}
	}

	// Combat parameters
	PARAMETER
	{
		name = CombatSequence
		type = Sequence

		title = "Destroy the target"

		PARAMETER
		{
			name = DestroyCraft
			type = TargetDestroyed

			title = "Destroy the static target"

			vessel = @/targetVessel
		}

		// Parameters for recovering the vessel after the mission
		PARAMETER
		{
			name = LandBase
			type = ReturnHome

			title = "Stop the testbed vessel on the surface"

			completeInSequence = true
		}

		PARAMETER
		{
			name = RecoverBase
			type = RecoverVessel

			title = "Recover the vessel"
			completedMessage = "The testbed vessel was successfully recovered!"

			completeInSequence = true
		}
	}
}
