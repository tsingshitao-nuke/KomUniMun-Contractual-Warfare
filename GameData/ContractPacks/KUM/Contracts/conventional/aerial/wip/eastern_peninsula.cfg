CONTRACT_TYPE
{
	name = kumAirEasternPeninsula1

	title = "easternpeninsula"
	genericTitle = "easternpeninsula"

	group = munistorumAerial
	agent = Komnenus Universalis Munistorum

	description = "description" + "\n\nMission Latitude: " + @titleLat + "\nMission Longitude: " + @titleLon + @/munistorumDataStore:recoveryLocations
	genericDescription = "genericDescription"

	topic = Weapons
	subject = Experiment

	synopsis = "synopsis"

	completedMessage = "completedMessage"

	minExpiry = 0.0
	maxExpiry = 0.0

	cancellable = true
	declinable = true

	targetBody = HomeWorld()

	maxCompletions = 0
	maxSimultaneous = 1

	DATA
	{
		type = int

		// Name Safety
		nameAppend = Random(0, 65535)
		uniquenessCheck = CONTRACT_ACTIVE
		hidden = true
	}

	DATA
	{
		type = string

		title = "Target vessels"

		// Target Names
		targetAircraft1 = "Aircraft 1" + " ID: " + @/nameAppend
		targetAircraft2 = "Aircraft 2" + " ID: " + @/nameAppend
		targetAircraft3 = "Aircraft 3" + " ID: " + @/nameAppend
		targetAircraft4 = "Aircraft 4" + " ID: " + @/nameAppend
	}

	DATA
	{
		type = List<string>

		// Vehicle Lists
		aircraftList = @/munistorumDataStore:standardFighters
	}

	DATA
	{
		type = double

		// Rewards
		science = 0.0 // Zero for non-test missions
		reputation = 5 * Random(0.8, 1.2)
		funds = 8000 * Random(0.8, 1.2)

		// Vehicle Coordinates
		squadLat = Random(4.9, 9.2)
		squadLon = Random(-36.0, -38.0)
		squadAlt = Random(5000.0, 10000.0)
		squadHdg = Random(0.0, 360.0)

		// Title Coordinates
		titleLat = Round(@squadLat)
		titleLon = Round(@squadLon)
	}

	REQUIREMENT
	{
		name = CompleteContract
		type = CompleteContract
		contractType = kumAirRequiredAerial
	}

	// Main contract rewards
	rewardScience = @/science
	rewardReputation = @/reputation
	rewardFunds = @/funds

	failureReputation = @/reputation / 4
	failureFunds = @/funds / 8
	advanceFunds = @/funds / 4

	BEHAVIOUR
	{
		name = SpawnAircraft
		type = SpawnVessel
		deferVesselCreation = true

		VESSEL
		{
			name = @/targetAircraft1
			craftURL = "ContractPacks/KUM/Assets/Ships/" + @/aircraftList.Random()
			flagURL = Squad/Flags/satellite
			vesselType = Unknown
			owned = false
			targetBody = HomeWorld()

			lat = @/squadLat
			lon = @/squadLon
			alt = @/squadAlt

			heading = @/squadHdg
		}

		VESSEL
		{
			name = @/targetAircraft2
			craftURL = "ContractPacks/KUM/Assets/Ships/" + @/aircraftList.Random()
			flagURL = Squad/Flags/satellite
			vesselType = Unknown
			owned = false
			targetBody = HomeWorld()

			lat = @/squadLat
			lon = @/squadLon
			alt = @/squadAlt

			heading = @/squadHdg
		}

		VESSEL
		{
			name = @/targetAircraft3
			craftURL = "ContractPacks/KUM/Assets/Ships/" + @/aircraftList.Random()
			flagURL = Squad/Flags/satellite
			vesselType = Unknown
			owned = false
			targetBody = HomeWorld()

			lat = @/squadLat
			lon = @/squadLon
			alt = @/squadAlt

			heading = @/squadHdg
		}

		VESSEL
		{
			name = @/targetAircraft4
			craftURL = "ContractPacks/KUM/Assets/Ships/" + @/aircraftList.Random()
			flagURL = Squad/Flags/satellite
			vesselType = Unknown
			owned = false
			targetBody = HomeWorld()

			lat = @/squadLat
			lon = @/squadLon
			alt = @/squadAlt

			heading = @/squadHdg
		}
	}

	// Destroy all mission vessels (if possible) for safety
	BEHAVIOUR
	{
		name = ContingencyCleanup
		type = DestroyVessel

		onState = CONTRACT_COMPLETED

		vessel = @/targetAircraft1
	}

	// Recovery waypoints
	BEHAVIOUR
	{
		name = ReturnWaypoint
		type = WaypointGenerator

		WAYPOINT
		{
			name = kscWaypoint

			hidden = true

			clustered = false
			underwater = false

			targetBody = HomeWorld()

			latitude = -0.1025
			longitude = -74.5752
			altitude = 68.4
		}

		WAYPOINT
		{
			name = islandWaypoint

			hidden = true

			clustered = false
			underwater = false

			targetBody = HomeWorld()

			latitude = -1.5408
			longitude = -71.9097
			altitude = 117.0
		}

		WAYPOINT
		{
			name = inlandWaypoint

			hidden = true

			clustered = false
			underwater = false

			targetBody = HomeWorld()

			latitude = 20.6666
			longitude = -146.4666
			altitude = 422.0
		}

		WAYPOINT
		{
			name = glacierWaypoint

			hidden = true

			clustered = false
			underwater = false

			targetBody = HomeWorld()

			latitude = 73.5615
			longitude = 84.2474
			altitude = 0.0
		}

		WAYPOINT
		{
			name = coveWaypoint

			hidden = true

			clustered = false
			underwater = false

			targetBody = HomeWorld()

			latitude = 3.7476
			longitude = -72.2132
			altitude = 0.0
		}

		WAYPOINT
		{
			name = craterWaypoint

			hidden = true

			clustered = false
			underwater = false

			targetBody = HomeWorld()

			latitude = 8.3859
			longitude = -179.6977
			altitude = 0.0
		}

		WAYPOINT
		{
			name = mahiWaypoint

			hidden = true

			clustered = false
			underwater = false

			targetBody = HomeWorld()

			latitude = -49.8024
			longitude = -120.7659
			altitude = 0.0
		}

		WAYPOINT
		{
			name = dessertWaypoint

			hidden = true

			clustered = false
			underwater = false

			targetBody = HomeWorld()

			latitude = -6.5798
			longitude = -143.9952
			altitude = 822.5
		}

		WAYPOINT
		{
			name = woomerangWaypoint

			hidden = true

			clustered = false
			underwater = false

			targetBody = HomeWorld()

			latitude = 45.29
			longitude = 136.11
			altitude = 739.0
		}
	}

	// Parameters for completing the contract
	PARAMETER
	{
		name = IdentificationSequence
		type = All

		title = "Identify the units"
		completedMessage = "The units were identified, they are hostile! Destroy them!"

		rewardReputation = 4 * Random(0.8, 1.2)

		disableOnStateChange = true
		optional = true

		PARAMETER
		{
			name = RendezvousCraft
			type = Rendezvous

			title = "Approach the vehicle within 2000 meters of distance"
			notes = "Rendezvous should allow us to identify the units with a special device."

			vessel = @/targetAircraft1

			disableOnStateChange = false

			distance = 2000.0
		}

		PARAMETER
		{
			name = DurationDelay
			type = Duration

			preWaitText = "Rendezvous for identification"
			waitingText = "Identifying units..."
			completionText = "Identification"

			completeInSequence = true

			duration = 10s

			startCriteria = PARAMETER_COMPLETION
			parameter = RendezvousCraft
		}
	}

	// Combat parameters
	PARAMETER
	{
		name = CombatSequence
		type = Sequence

		title = "Engage the enemy units"

		PARAMETER
		{
			name = DestroyCraft
			type = TargetDestroyed

			title = "Eliminate the hostile units"

			vessel = @/targetAircraft1
		}

		// Parameters for recovering the vessel after the mission
		PARAMETER
		{
			name = LandBase
			type = ReturnHome

			title = "Stop your vessel on the surface"

			completeInSequence = true
		}

		PARAMETER
		{
			name = AnyBase
			type = Any

			title = "Return to a KSC controlled facility"

			disableOnStateChange = false
			completeInSequence = true
			hideChildren = true

			PARAMETER
			{
				name = isInKsc
				type = VisitWaypoint

				index = 0
				distance = 2000.0
			}

			PARAMETER
			{
				name = isInIsland
				type = VisitWaypoint

				index = 1
				distance = 2000.0
			}

			PARAMETER
			{
				name = isInInland
				type = VisitWaypoint

				index = 2
				distance = 2000.0
			}

			PARAMETER
			{
				name = isInGlacier
				type = VisitWaypoint

				index = 3
				distance = 2000.0
			}

			PARAMETER
			{
				name = isInCove
				type = VisitWaypoint

				index = 4
				distance = 2000.0
			}

			PARAMETER
			{
				name = isInCrater
				type = VisitWaypoint

				index = 5
				distance = 2000.0
			}

			PARAMETER
			{
				name = isInMahi
				type = VisitWaypoint

				index = 6
				distance = 2000.0
			}

			PARAMETER
			{
				name = isInDessert
				type = VisitWaypoint

				index = 7
				distance = 2000.0
			}

			PARAMETER
			{
				name = isInWoomerang
				type = VisitWaypoint

				index = 8
				distance = 2000.0
			}
		}

		PARAMETER
		{
			name = RecoverBase
			type = RecoverVessel

			title = "Recover the vessel"
			completedMessage = "The vessel was successfully recovered!"

			completeInSequence = true
		}
	}
}
