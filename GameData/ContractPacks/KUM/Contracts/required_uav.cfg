CONTRACT_TYPE
{
	name = kumRequiredUav

	title = "Unidentified aircraft over the KSC"
	genericTitle = "Unidentified aircraft over the KSC"

	group = munistorumDataStore
	agent = Komnenus Universalis Munistorum

	description = "An unidentified aircraft has recently violated KSC airspace, for the safety of our operations you must identify and destroy the violating aircraft." + "\n\nMission Latitude: " + @titleLat + "\nMission Longitude: " + @titleLon
	genericDescription = "An unidentified aircraft has recently violated KSC airspace, for the safety of our operations you must identify and destroy the violating aircraft."

	topic = Weapons
	subject = Experiment

	synopsis = "Identify the aircraft and then shoot it down."

	completedMessage = "Mission accomplished! This was a rather suspicios violation, we will look over the flight log and then debrief you on the situation."

	minExpiry = 0.0
	maxExpiry = 0.0

	cancellable = true
	declinable = false

	targetBody = HomeWorld()

	maxCompletions = 1
	maxSimultaneous = 1

	// Data node for the rewards
	DATA
	{
		type = double

		science = 0.0 // Zero for non-test missions
		reputation = 4 * Random(0.8, 1.2)
		funds = 4000 * Random(0.8, 1.2)
	}

	// Target Names
	DATA
	{
		type = string

		targetUav = "Unidentified Aircraft"
	}

	// Vehicle Coordinates
	DATA
	{
		type = double

		squadLat = Random(-0.2, 0.2)
		squadLon = Random(-73.575, -72.575)
		squadAlt = Random(5000.0, 10000.0)
		squadHdg = Random(0.0, 360.0)
	}

	// Title Coordinates
	DATA
	{
		type = double

		titleLat = Round(@squadLat)
		titleLon = Round(@squadLon)
	}

	// Requirement node for contract prerequisites
	REQUIREMENT
	{
		name = PartUnlocked
		type = PartUnlocked
		part = missileController
	}

	// Value definitions
	rewardScience = @/science
	rewardReputation = @/reputation
	rewardFunds = @/funds

	failureReputation = @/reputation / 4
	failureFunds = @/funds / 8
	advanceFunds = @/funds / 4

	// Behaviour such as vessel location, name etc

	// Drone
	BEHAVIOUR
	{
		name = SpawnDrone
		type = SpawnVessel
		deferVesselCreation = true

		VESSEL
		{
			name = @/targetUav
			craftURL = "ContractPacks/KUM/Assets/Ships/standard/uav_01a.craft"
			flagURL = Squad/Flags/satellite
			vesselType = Unknown
			owned = false
			targetBody = HomeWorld()

			lat = @/squadLat
			lon = @/squadLon
			alt = @/squadAlt

			heading = @/squadHdg
		}
	}

	// Destroy all mission vessels for safety
	BEHAVIOUR
	{
		name = ContingencyCleanup
		type = DestroyVessel

		onState = PARAMETER_COMPLETED
		parameter = DestroyCraft

		vessel = @/targetUav
	}

	// Recovery waypoints
	BEHAVIOUR
	{
		name = ReturnWaypoint
		type = WaypointGenerator

		WAYPOINT
		{
			name = kscWaypoint

			hidden = true

			clustered = false
			underwater = false

			targetBody = HomeWorld()

			latitude = -0.1025
			longitude = -74.5752
			altitude = 68.4
		}

		WAYPOINT
		{
			name = islandWaypoint

			hidden = true

			clustered = false
			underwater = false

			targetBody = HomeWorld()

			latitude = -1.5408
			longitude = -71.9097
			altitude = 117.0
		}

		WAYPOINT
		{
			name = inlandWaypoint

			hidden = true

			clustered = false
			underwater = false

			targetBody = HomeWorld()

			latitude = 20.6666
			longitude = -146.4666
			altitude = 422.0
		}

		WAYPOINT
		{
			name = glacierWaypoint

			hidden = true

			clustered = false
			underwater = false

			targetBody = HomeWorld()

			latitude = 73.5615
			longitude = 84.2474
			altitude = 0.0
		}

		WAYPOINT
		{
			name = coveWaypoint

			hidden = true

			clustered = false
			underwater = false

			targetBody = HomeWorld()

			latitude = 3.7476
			longitude = -72.2132
			altitude = 0.0
		}

		WAYPOINT
		{
			name = craterWaypoint

			hidden = true

			clustered = false
			underwater = false

			targetBody = HomeWorld()

			latitude = 8.3859
			longitude = -179.6977
			altitude = 0.0
		}

		WAYPOINT
		{
			name = mahiWaypoint

			hidden = true

			clustered = false
			underwater = false

			targetBody = HomeWorld()

			latitude = -49.8024
			longitude = -120.7659
			altitude = 0.0
		}

		WAYPOINT
		{
			name = dessertWaypoint

			hidden = true

			clustered = false
			underwater = false

			targetBody = HomeWorld()

			latitude = -6.5798
			longitude = -143.9952
			altitude = 822.5
		}

		WAYPOINT
		{
			name = woomerangWaypoint

			hidden = true

			clustered = false
			underwater = false

			targetBody = HomeWorld()

			latitude = 45.29
			longitude = 136.11
			altitude = 739.0
		}
	}

	// Parameters for completing the contract
	PARAMETER
	{
		name = IdentificationSequence
		type = All

		title = "Identify the aircraft"
		completedMessage = "The aircraft was identified, it is hostile! Shoot it down!"

		rewardReputation = 4 * Random(0.8, 1.2)

		disableOnStateChange = true
		optional = true

		PARAMETER
		{
			name = RendezvousCraft
			type = Rendezvous

			title = "Approach the vehicle within 500 meters of distance"
			notes = "Rendezvous should allow us to identify the aircraft with a special device."

			vessel = @/targetUav

			disableOnStateChange = false

			distance = 500.0
		}

		PARAMETER
		{
			name = DurationDelay
			type = Duration

			preWaitText = "Rendezvous for identification"
			waitingText = "Identifying aircraft..."
			completionText = "Identification"

			completeInSequence = true

			duration = 10s

			startCriteria = PARAMETER_COMPLETION
			parameter = RendezvousCraft
		}
	}

	// Combat parameters
	PARAMETER
	{
		name = CombatSequence
		type = Sequence

		title = "Intercept and destroy the violating aircraft"

		PARAMETER
		{
			name = DestroyCraft
			type = TargetDestroyed

			title = "Shoot down the aircraft"
			notes = "This aircraft has violated our airspace without communication and can be destroyed."

			vessel = @/targetUav
		}

		// Parameters for recovering the vessel after the mission
		PARAMETER
		{
			name = LandBase
			type = ReturnHome

			title = "Stop your vessel on the surface"

			completeInSequence = true
		}

		PARAMETER
		{
			name = AnyBase
			type = Any

			title = "Return to a KSC controlled facility"

			completeInSequence = true

			PARAMETER
			{
				name = isInKsc
				type = VisitWaypoint

				title = "At the KSC"

				index = 0
				distance = 2000.0

				hideOnCompletion = true
			}

			PARAMETER
			{
				name = isInIsland
				type = VisitWaypoint

				title = "At the Island Airfield"

				index = 1
				distance = 2000.0

				hideOnCompletion = true
			}

			PARAMETER
			{
				name = isInInland
				type = VisitWaypoint

				title = "At the Baikerbanur Spaceport"

				index = 2
				distance = 2000.0

				hideOnCompletion = true
			}

			PARAMETER
			{
				name = isInGlacier
				type = VisitWaypoint

				title = "At the Glacier Launch Site"

				index = 3
				distance = 2000.0

				hideOnCompletion = true
			}

			PARAMETER
			{
				name = isInCove
				type = VisitWaypoint

				title = "At the Cove Launch Site"

				index = 4
				distance = 2000.0

				hideOnCompletion = true
			}

			PARAMETER
			{
				name = isInCrater
				type = VisitWaypoint

				title = "At the Crater Launch Site"

				index = 5
				distance = 2000.0

				hideOnCompletion = true
			}

			PARAMETER
			{
				name = isInMahi
				type = VisitWaypoint

				title = "At the Mahi Mahi Launch Site"

				index = 6
				distance = 2000.0

				hideOnCompletion = true
			}

			PARAMETER
			{
				name = isInDessert
				type = VisitWaypoint

				title = "At the Dessert Spaceport"

				index = 7
				distance = 2000.0

				hideOnCompletion = true
			}

			PARAMETER
			{
				name = isInWoomerang
				type = VisitWaypoint

				title = "At the Woomerang Launch Site"

				index = 8
				distance = 2000.0

				hideOnCompletion = true
			}
		}

		PARAMETER
		{
			name = RecoverBase
			type = RecoverVessel

			title = "Recover the vessel"
			completedMessage = "The vessel was successfully recovered!"

			completeInSequence = true
		}
	}
}
