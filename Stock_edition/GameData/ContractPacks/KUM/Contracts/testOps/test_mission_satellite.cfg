CONTRACT_TYPE
{
	name = kumTestMissionSatellite1

	title = "Destroy a target satellite near " + @/orbitBody + " (" + @titlePeriod + ")"
	genericTitle = "Destroy a target satellite"

	group = munistorumTestOps
	agent = Komnenus Universalis Munistorum

	description = "It has recently come to our attention that we have many weapons lying around, some which we cannot even confirm are still functional, that's where you come in." + "Due to the proliferation of space debris as a consequence of this mission, it is likely that observers will condone this operation."
	genericDescription = "It has recently come to our attention that we have many weapons lying around, some which we cannot even confirm are still functional, that's where you come in." + "Due to the proliferation of space debris as a consequence of this mission, it is likely that observers will condone this operation."

	topic = Weapons
	subject = Experiment

	synopsis = "Test some hardware while destroying a target satellite."

	completedMessage = "Success! The staff at our facility is overjoyed with the data!"

	minExpiry = 0.0
	maxExpiry = 0.0

	cancellable = true
	declinable = true

	targetBody = @/orbitBody

	maxCompletions = 0
	maxSimultaneous = 4

	DATA
	{
		type = int

		// Name Safety
		nameAppend = Random(0, 65535)
		uniquenessCheck = CONTRACT_ACTIVE
		hidden = true
	}

	DATA
	{
		type = int

		// Is part testing a parameter?
		partTestValue = Random(0,1)

		// Is recovery necessary?
		needRecoverValue = Random(0,1)

		// Period of mission
		periodSelector = 1 // Random(0,1)
		hidden = true
	}

	DATA
	{
		type = string

		title = "Target vessels"
		titlePeriod = @/KUM:periodList.ElementAt(@/periodSelector + 2)

		// Target Names
		targetVessel = "Target Satellite" + " ID: " + @/nameAppend
	}

	DATA
	{
		type = List<string>

		// Vehicle Lists
		targetList = @/periodSelector == 0 ? @/KUM:lateTargetSatellites : @/KUM:standardTargetSatellites
		hidden = true
	}

	DATA
	{
		type = AvailablePart

		// Test Part
		testPart = AllParts().Where(b => b.IsUnlocked() && (b.Description().Contains("EKV-Testable") || b.Description().Contains("CNN-Testable"))).Random()
		hidden = true
	}

	DATA
	{
		type = double

		// Rewards
		science = 2 * (Random(0.5, 2.2) * Pow((@/periodSelector + 1), 0.333333))
		reputation = 0 // Must be greater or equal to 0
		funds = 8000 * (Random(0.8, 1.2) * Pow((@/periodSelector + 1), 0.333333))
	}

	DATA
	{
		type = CelestialBody

		// Planet
		orbitBody = OrbitedBodies().Where(b => b.IsHomeWorld() || (b.IsMoon() && b.Parent().IsHomeWorld())).Random()
		hidden = true
	}

	REQUIREMENT
	{
		name = CompleteContract
		type = CompleteContract
		contractType = kumRequiredUav
	}

	// Main contract rewards
	rewardScience = @/science
	rewardReputation = @/reputation
	rewardFunds = @/funds

	failureReputation = @/reputation / 4
	failureFunds = @/funds / 8
	advanceFunds = @/funds / 4

	BEHAVIOUR
	{
		name = SpawnTarget
		type = SpawnVessel

		VESSEL
		{
			name = @/targetVessel
			craftURL = "ContractPacks/KUM/Assets/Ships/" + @/targetList.Random()
			flagURL = Squad/Flags/retro
			vesselType = Unknown
			owned = false
			targetBody = @/orbitBody

			ORBIT
			{
				SMA = Random(686750.0, 1373500.0)
				ECC = 0.0
				INC = Random(-90.0, 90.0)
				LPE = 4.0
				LAN = 140.0
				MNA = 0.0
				EPH = 1787.3
				REF = 1
			}
		}
	}

	// Destroy all mission vessels (if possible) for safety
	BEHAVIOUR
	{
		name = ContingencyCleanup
		type = DestroyVessel

		onState = CONTRACT_COMPLETED

		vessel = @/targetVessel
	}

	// Parameters for completing the contract
	PARAMETER
	{
		name = TestingSequence
		type = Sequence

		title = "Test the " + @/testPart + " on the target (Optional)"
		completedMessage = "Tests complete, destroy the target!"

		rewardScience = (@/science * 2)
		rewardReputation = @/reputation
		rewardFunds = (@/funds / 2)

		failureReputation = 0.0
		failureFunds = 0.0

		optional = true

		REQUIREMENT
		{
			name = Expression
			type = Expression

			expression = @/partTestValue == 1
		}

		PARAMETER
		{
			name = TestProcedure
			type = PartTest

			notes = "Run the test after all the procedures have been completed."

			optional = true

			part = @/testPart

			PARAMETER
			{
				name = HasTestPart
				type = PartValidation

				title = "Have at least one " + @/testPart + " on your vehicle"

				part = @/testPart
				minCount = 1
			}

			PARAMETER
			{
				name = RendezvousCraft
				type = Rendezvous

				title = "Approach the target within 2 kilometers of distance"

				vessel = @/targetVessel

				disableOnStateChange = false

				distance = 2000.0
			}

			PARAMETER
			{
				name = DurationDelay
				type = Duration

				preWaitText = "Rendezvous for equipment testing"
				waitingText = "Testing equipment..."
				completionText = "Equipment testing"

				completeInSequence = true

				duration = 20s

				startCriteria = PARAMETER_COMPLETION
				parameter = RendezvousCraft
			}
		}
	}

	// Combat parameters
	PARAMETER
	{
		name = CombatSequence
		type = Sequence

		title = "Destroy the target"

		PARAMETER
		{
			name = DestroyCraft
			type = TargetDestroyed

			title = "Destroy the target satellite"

			vessel = @/targetVessel
		}

		// Parameters for recovering the vessel after the mission
		PARAMETER
		{
			name = LandBase
			type = ReturnHome

			title = "Stop the testbed vessel on the surface"

			completeInSequence = true

			REQUIREMENT
			{
				name = NeedLand
				type = Expression

				expression = @/needRecoverValue == 1
			}
		}

		PARAMETER
		{
			name = RecoverBase
			type = RecoverVessel

			title = "Recover the vessel"
			completedMessage = "The testbed vessel was successfully recovered!"

			completeInSequence = true

			REQUIREMENT
			{
				name = NeedRecover
				type = Expression

				expression = @/needRecoverValue == 1
			}
		}
	}
}
