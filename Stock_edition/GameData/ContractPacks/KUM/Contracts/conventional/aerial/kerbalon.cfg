		}

		WAYPOINT
		{
			name = craterWaypoint

			hidden = true

			clustered = false
			underwater = false

			targetBody = HomeWorld()

			latitude = 8.3859
			longitude = -179.6977
			altitude = 0.0
		}

		WAYPOINT
		{
			name = mahiWaypoint

			hidden = true

			clustered = false
			underwater = false

			targetBody = HomeWorld()

			latitude = -49.8024
			longitude = -120.7659
			altitude = 0.0
		}

		WAYPOINT
		{
			name = dessertWaypoint

			hidden = true

			clustered = false
			underwater = false

			targetBody = HomeWorld()

			latitude = -6.5798
			longitude = -143.9952
			altitude = 822.5
		}

		WAYPOINT
		{
			name = woomerangWaypoint

			hidden = true

			clustered = false
			underwater = false

			targetBody = HomeWorld()

			latitude = 45.29
			longitude = 136.11
			altitude = 739.0
		}
	}

	// River waypoints
	BEHAVIOUR
	{
		name = RiverWaypoint
		type = WaypointGenerator

		WAYPOINT
		{
			name = River Entrance

			icon = balloon

			clustered = false
			underwater = false

			targetBody = HomeWorld()

			latitude = 30.125
			longitude = -135.70
			altitude = 0.0
		}

		WAYPOINT
		{
			name = Progress Marker 1

			icon = balloon

			clustered = false
			underwater = false

			targetBody = HomeWorld()

			latitude = 31.39
			longitude = -137.15
			altitude = 0.0
		}

		WAYPOINT
		{
			name = Progress Marker 2

			icon = balloon

			clustered = false
			underwater = false

			targetBody = HomeWorld()

			latitude = 33.9
			longitude = -137.9
			altitude = 0.0
		}

		WAYPOINT
		{
			name = Progress Marker 3

			icon = balloon

