			longitude = -138.18
			altitude = 0.0
		}

		WAYPOINT
		{
			name = River Exit

			icon = balloon

			clustered = false
			underwater = false

			targetBody = HomeWorld()

			latitude = 38.56
			longitude = -140.42
			altitude = 0.0
		}
	}

	// Parameters for completing the contract

	PARAMETER
	{
		name = ApproachSequence
		type = Sequence

		title = "Approach through the river"

		failWhenCompleteOutOfOrder = true

		PARAMETER
		{
			name = Entrance
			type = VisitWaypoint

			index = 9
			distance = 2000.0

			disableOnStateChange = true
			hideOnCompletion = true
		}

		PARAMETER
		{
			name = Progress1
			type = VisitWaypoint

			index = 10
			distance = 2000.0

			disableOnStateChange = true
			hideOnCompletion = true
		}

		PARAMETER
		{
			name = Progress2
			type = VisitWaypoint

			index = 11
			distance = 2000.0

			disableOnStateChange = true
			hideOnCompletion = true
		}

		PARAMETER
		{
			name = Progress3
			type = VisitWaypoint

			index = 12
			distance = 2000.0

			disableOnStateChange = true
			hideOnCompletion = true
		}

		PARAMETER
		{
			name = Progress4
			type = VisitWaypoint

			index = 13
			distance = 2000.0

			disableOnStateChange = true
			hideOnCompletion = true
		}

		PARAMETER
		{
			name = Exit
			type = VisitWaypoint

			index = 14
			distance = 2000.0

			disableOnStateChange = true
			hideOnCompletion = true
		}

		PARAMETER
		{
			name = RiverAltitudeCheck
			type = AtMost

			title = "Without exceeding the altitude limit of 250m"

			count = 1
			completeInSequence = true

			PARAMETER
			{
				name = EntranceChecker
				type = VisitWaypoint

				index = 9
				distance = 2000.0

				hidden = true

				disableOnStateChange = true
				hideOnCompletion = true
			}

			PARAMETER
			{
				name = ReachState
				type = ReachState

				hidden = true

				minAltitude = 250
			}
		}

		// Combat parameters
		PARAMETER
		{
			name = CombatSequence
			type = Sequence

			title = "Engage the enemy units"

			PARAMETER
			{
				name = DestroyCraft
				type = TargetDestroyed

				title = "Eliminate the hostile unit"

				vessel = @/targetAircraft
			}

			// Parameters for recovering the vessel after the mission
			PARAMETER
			{
				name = LandBase
				type = ReturnHome

				title = "Stop your vessel on the surface"

				completeInSequence = true
			}

			PARAMETER
			{
				name = AnyBase
				type = Any

				title = "Return to a KSC controlled facility"

				disableOnStateChange = false
				completeInSequence = true
				hideChildren = true

				PARAMETER
				{
					name = isInKsc
					type = VisitWaypoint

					index = 0
					distance = 2000.0
				}

				PARAMETER
				{
