				}

				PARAMETER
				{
					name = isInCrater
					type = VisitWaypoint

					index = 5
					distance = 2000.0
				}

				PARAMETER
				{
					name = isInMahi
					type = VisitWaypoint

					index = 6
					distance = 2000.0
				}

				PARAMETER
				{
					name = isInDessert
					type = VisitWaypoint

					index = 7
					distance = 2000.0
				}

				PARAMETER
				{
					name = isInWoomerang
					type = VisitWaypoint

					index = 8
					distance = 2000.0
				}
			}

			PARAMETER
			{
				name = RecoverBase
				type = RecoverVessel

				title = "Recover the vessel"
				completedMessage = "The vessel was successfully recovered!"

				completeInSequence = true
			}
		}
	}
}
