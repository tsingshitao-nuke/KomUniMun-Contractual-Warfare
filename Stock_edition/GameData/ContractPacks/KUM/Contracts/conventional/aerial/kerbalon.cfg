CONTRACT_TYPE
{
	name = kumAirKerbalonPixy

	title = "Hostile near the Kerbalon River"
	genericTitle = "Hostile near the Kerbalon River"

	group = munistorumAerial
	agent = Komnenus Universalis Munistorum

	description = "A prototype fighter was recently stolen and we've detected a vessel with a matching RCS signature near the Kerbalon River." + "\nThe aircraft has special weapons, remain aware of its burst missiles and directed energy weapon." + "\nYou must approach the aircraft from the river in order to remain undetected and then engage the aircraft in aerial combat." + "\n\nWe cannot tolerate robbery of this aircraft, destroy it." + "\n\nMission Latitude: " + @titleLat + "\nMission Longitude: " + @titleLon + @/KUM:recoveryLocations
	genericDescription = "A prototype fighter was recently stolen and we've detected a vessel with a matching RCS signature near the Kerbalon River." + "\nThe aircraft has special weapons, remain aware of its burst missiles and directed energy weapon." + "\nYou must approach the aircraft from the river in order to remain undetected and then engage the aircraft in aerial combat." + "\n\nWe cannot tolerate robbery of this aircraft, destroy it."

	topic = Weapons
	subject = Experiment

	synopsis = "Destroy the stolen aircraft near the Kerbalon River."

	completedMessage = "Mission accomplished! The prototype aircraft was successfully destroyed, we have scheduled a meeting with your pilot, rest assured he will survive."

	minExpiry = 0.0
	maxExpiry = 0.0

	cancellable = true
	declinable = true

	targetBody = HomeWorld()

	maxCompletions = 0
	maxSimultaneous = 1

	DATA
	{
		type = int

		// Name Safety
		nameAppend = Random(0, 65535)
		uniquenessCheck = CONTRACT_ACTIVE
		hidden = true
	}

	DATA
	{
		type = string

		title = "Target vessels"

		// Target Names
		targetAircraft = "SP Aircraft" + " ID: " + @/nameAppend
	}

	DATA
	{
		type = double

		// Rewards
		science = 0.0 // Zero for non-test missions
		reputation = 10 * Random(0.8, 2.0)
		funds = 10000 * Random(0.8, 1.2)

		// Vehicle Coordinates
		squadLat = Random(45.0, 46.0)
		squadLon = Random(-141.5, -141.5)
		squadAlt = Random(5000.0, 10000.0)
		squadHdg = Random(0.0, 360.0)

		// Title Coordinates
		titleLat = Round(@squadLat)
		titleLon = Round(@squadLon)
	}

	REQUIREMENT
	{
		name = CompleteContract
		type = CompleteContract
		contractType = kumAirKerbalonPlains1
	}

	REQUIREMENT
	{
		name = CompleteContract
		type = CompleteContract
		contractType = kumAirKerbalonTundra3
	}

	// Main contract rewards
	rewardScience = @/science
	rewardReputation = @/reputation
	rewardFunds = @/funds

	failureReputation = @/reputation / 4
	failureFunds = @/funds / 8
	advanceFunds = @/funds / 4

	BEHAVIOUR
	{
		name = SpawnAircraft
		type = SpawnVessel

		VESSEL
		{
			name = @/targetAircraft
			craftURL = "ContractPacks/KUM/Assets/Ships/standard/sp_fighter_01a.craft"
			flagURL = Squad/Flags/satellite
			vesselType = Unknown
			owned = false
			targetBody = HomeWorld()

			lat = @/squadLat
			lon = @/squadLon
			alt = @/squadAlt

			heading = @/squadHdg
		}
	}

	// Destroy all mission vessels (if possible) for safety
	BEHAVIOUR
	{
		name = ContingencyCleanup
		type = DestroyVessel

		onState = CONTRACT_COMPLETED

		vessel = @/targetAircraft
	}

	// Recovery waypoints
	BEHAVIOUR
	{
		name = ReturnWaypoint
		type = WaypointGenerator

		WAYPOINT
		{
			name = kscWaypoint

			hidden = true

			clustered = false
			underwater = false

			targetBody = HomeWorld()

			latitude = -0.1025
			longitude = -74.5752
			altitude = 68.4
		}

		WAYPOINT
		{
			name = islandWaypoint

			hidden = true

			clustered = false
			underwater = false

			targetBody = HomeWorld()

			latitude = -1.5408
			longitude = -71.9097
			altitude = 117.0
		}

		WAYPOINT
		{
			name = inlandWaypoint

			hidden = true

			clustered = false
			underwater = false

			targetBody = HomeWorld()

			latitude = 20.6666
