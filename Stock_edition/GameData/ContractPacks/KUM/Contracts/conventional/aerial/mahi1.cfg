CONTRACT_TYPE
{
	name = kumAirMahi1

	title = "Mahi Mahi Getaway Occupation" + " (" + @titlePeriod + ")"
	genericTitle = "Mahi Mahi Getaway Occupation"

	group = munistorumAerial
	agent = Komnenus Universalis Munistorum

	description = "Hostile forces are currently threathing an occupation of the Mahi Mahi island, we cannot allow this to happen. We have detected an element currently patrolling the airspace, deal with them so that our airborne forces can seize the area and locate hostile installations." + "\nIt is of high priority that the Mahi Mahi island remains under our control, we cannot allow their occupation of the area to succeed." + "\n\nMission Latitude: " + @titleLat + "\nMission Longitude: " + @titleLon + @/KUM:recoveryLocations
	genericDescription = "Hostile forces are currently threathing an occupation of the Mahi Mahi island, we cannot allow this to happen. We have detected an element currently patrolling the airspace, deal with them so that our airborne forces can seize the area and locate hostile installations." + "\nIt is of high priority that the Mahi Mahi island remains under our control, we cannot allow their occupation of the area to succeed."

	topic = Weapons
	subject = Experiment

	synopsis = "Destroy a hostile element currently patrolling over the Mahi Mahi island."

	completedMessage = "Mission accomplished! You successfully breached the hostile forces' defenses and we have secured a foothold in the area."

	minExpiry = 0.0
	maxExpiry = 0.0

	cancellable = true
	declinable = true

	targetBody = HomeWorld()

	maxCompletions = 0
	maxSimultaneous = 1

	DATA
	{
		type = int

		// Name Safety
		nameAppend = Random(0, 65535)
		uniquenessCheck = CONTRACT_ACTIVE
		hidden = true
	}

	DATA
	{
		type = int

		// Period of mission
		periodSelector = Random(0,2)
		hidden = true
	}

	DATA
	{
		type = string

		title = "Target vessels"
		titlePeriod = @/KUM:periodList.ElementAt(@/periodSelector)

		// Target Names
		targetAircraft1 = "Aircraft 1" + " ID: " + @/nameAppend
		targetAircraft2 = "Aircraft 2" + " ID: " + @/nameAppend
		targetAircraft3 = "Aircraft 3" + " ID: " + @/nameAppend
	}

	DATA
	{
		type = List<string>

		// Vehicle Lists
		aircraftList = @/periodSelector == 0 ? @/KUM:midFighters : (@/periodSelector == 1 ? @/KUM:lateFighters : @/KUM:standardFighters)
		hidden = true
	}

	DATA
	{
		type = double

		// Rewards
		science = 0.0 // Zero for non-test missions
		reputation = 7 * (Random(0.8, 2.0) * Pow((@/periodSelector + 1), 0.333333))
		funds = 7000 * (Random(0.8, 1.2) * Pow((@/periodSelector + 1), 0.333333))

		// Vehicle Coordinates
		squadLat = Random(-39.0, -58.5)
		squadLon = Random(-164.7, -114.0)
		squadAlt = Random(5000.0, 10000.0)
		squadHdg = Random(0.0, 360.0)

		// Title Coordinates
		titleLat = Round(@squadLat)
		titleLon = Round(@squadLon)
	}

	REQUIREMENT
	{
		name = CompleteContract
		type = CompleteContract
		contractType = kumAirRequiredAerial
	}

	// Main contract rewards
	rewardScience = @/science
	rewardReputation = @/reputation
	rewardFunds = @/funds

	failureReputation = @/reputation / 4
	failureFunds = @/funds / 8
	advanceFunds = @/funds / 4

	BEHAVIOUR
	{
		name = SpawnAircraft
		type = SpawnVessel

		VESSEL
		{
			name = @/targetAircraft1
			craftURL = "ContractPacks/KUM/Assets/Ships/" + @/aircraftList.Random()
			flagURL = Squad/Flags/satellite
			vesselType = Unknown
			owned = false
			targetBody = HomeWorld()

			lat = @/squadLat
			lon = @/squadLon
			alt = @/squadAlt
			height = 10.0

			heading = @/squadHdg
		}

		VESSEL
		{
			name = @/targetAircraft2
			craftURL = "ContractPacks/KUM/Assets/Ships/" + @/aircraftList.Random()
			flagURL = Squad/Flags/satellite
			vesselType = Unknown
			owned = false
			targetBody = HomeWorld()

			lat = @/squadLat - 0.02
			lon = @/squadLon - 0.02
			alt = @/squadAlt
			height = 10.0

			heading = @/squadHdg
		}

		VESSEL
		{
			name = @/targetAircraft3
			craftURL = "ContractPacks/KUM/Assets/Ships/" + @/aircraftList.Random()
			flagURL = Squad/Flags/satellite
			vesselType = Unknown
			owned = false
			targetBody = HomeWorld()

			lat = @/squadLat - 0.04
			lon = @/squadLon - 0.04
			alt = @/squadAlt
			height = 10.0

			heading = @/squadHdg
		}
	}

	// Destroy all mission vessels (if possible) for safety
	BEHAVIOUR
	{
		name = ContingencyCleanup
		type = DestroyVessel

		onState = CONTRACT_COMPLETED

		vessel = @/targetAircraft1
		vessel = @/targetAircraft2
		vessel = @/targetAircraft3
	}

	// Recovery waypoints
	BEHAVIOUR
	{
		name = ReturnWaypoint
		type = WaypointGenerator

		WAYPOINT
		{
			name = kscWaypoint

			hidden = true

			clustered = false
			underwater = false

			targetBody = HomeWorld()

			latitude = -0.1025
			longitude = -74.5752
			altitude = 68.4
		}

		WAYPOINT
		{
			name = islandWaypoint

			hidden = true

			clustered = false
			underwater = false

			targetBody = HomeWorld()

			latitude = -1.5408
			longitude = -71.9097
			altitude = 117.0
		}

		WAYPOINT
		{
			name = inlandWaypoint

			hidden = true

			clustered = false
			underwater = false

			targetBody = HomeWorld()

			latitude = 20.6666
			longitude = -146.4666
			altitude = 422.0
		}

		WAYPOINT
		{
			name = glacierWaypoint

			hidden = true

			clustered = false
			underwater = false

			targetBody = HomeWorld()

			latitude = 73.5615
			longitude = 84.2474
			altitude = 0.0
		}

		WAYPOINT
		{
			name = coveWaypoint

			hidden = true

			clustered = false
			underwater = false

			targetBody = HomeWorld()

			latitude = 3.7476
			longitude = -72.2132
			altitude = 0.0
		}

		WAYPOINT
		{
			name = craterWaypoint

			hidden = true

			clustered = false
			underwater = false

			targetBody = HomeWorld()

			latitude = 8.3859
			longitude = -179.6977
			altitude = 0.0
		}

		WAYPOINT
		{
			name = mahiWaypoint

			hidden = true

			clustered = false
			underwater = false

			targetBody = HomeWorld()

			latitude = -49.8024
			longitude = -120.7659
			altitude = 0.0
		}

		WAYPOINT
		{
			name = dessertWaypoint

			hidden = true

			clustered = false
			underwater = false

			targetBody = HomeWorld()

			latitude = -6.5798
			longitude = -143.9952
			altitude = 822.5
		}

		WAYPOINT
		{
			name = woomerangWaypoint

			hidden = true

			clustered = false
			underwater = false

			targetBody = HomeWorld()

			latitude = 45.29
			longitude = 136.11
			altitude = 739.0
		}
	}

	// Parameters for completing the contract

	// Combat parameters
	PARAMETER
	{
		name = CombatSequence
		type = Sequence

		title = "Engage the enemy units"

		PARAMETER
		{
			name = DestroyCraft
			type = TargetDestroyed

			title = "Eliminate the hostile units"

			vessel = @/targetAircraft1
			vessel = @/targetAircraft2
			vessel = @/targetAircraft3
		}

		// Parameters for recovering the vessel after the mission
		PARAMETER
		{
			name = LandBase
			type = ReturnHome

			title = "Stop your vessel on the surface"

			completeInSequence = true
		}

		PARAMETER
		{
			name = AnyBase
			type = Any

			title = "Return to a KSC controlled facility"

			disableOnStateChange = false
			completeInSequence = true
			hideChildren = true

			PARAMETER
			{
				name = isInKsc
				type = VisitWaypoint

				index = 0
				distance = 2000.0
			}

			PARAMETER
			{
				name = isInIsland
				type = VisitWaypoint

				index = 1
				distance = 2000.0
			}

			PARAMETER
			{
				name = isInInland
				type = VisitWaypoint

				index = 2
				distance = 2000.0
			}

			PARAMETER
			{
				name = isInGlacier
				type = VisitWaypoint

				index = 3
				distance = 2000.0
			}

			PARAMETER
			{
				name = isInCove
				type = VisitWaypoint

				index = 4
				distance = 2000.0
			}

			PARAMETER
			{
				name = isInCrater
				type = VisitWaypoint

				index = 5
				distance = 2000.0
			}

			PARAMETER
			{
				name = isInMahi
				type = VisitWaypoint

				index = 6
				distance = 2000.0
			}

			PARAMETER
			{
				name = isInDessert
				type = VisitWaypoint

				index = 7
				distance = 2000.0
			}

			PARAMETER
			{
				name = isInWoomerang
				type = VisitWaypoint

				index = 8
				distance = 2000.0
			}
		}

		PARAMETER
		{
			name = RecoverBase
			type = RecoverVessel

			title = "Recover the vessel"
			completedMessage = "The vessel was successfully recovered!"

			completeInSequence = true
		}
	}
}
